[pytest]
# Настройки для pytest

# Директория с тестами
testpaths = tests

# Python файлы с тестами
python_files = test_*.py

# Python классы с тестами
python_classes = Test*

# Python функции с тестами
python_functions = test_*

# Добавляем корневую директорию в Python path
pythonpath = .

# Маркеры для тестов
markers =
    integration: интеграционные тесты, требующие реальных подключений к БД
    slow: медленные тесты
    asyncio: асинхронные тесты (используется pytest-asyncio)

# Минимальная версия pytest
minversion = 7.0

# Опции по умолчанию
addopts = 
    -v
    --tb=short
    --strict-markers

# Настройка asyncio для pytest-asyncio
asyncio_mode = auto
